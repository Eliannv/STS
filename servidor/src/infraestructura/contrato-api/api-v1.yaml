  # VENTAS / FACTURAS
  # ══════════════════════════════════════════════════════════════════════════
  /factura/lista:
    get:
      tags: [Ventas / Facturas]
      summary: Listar facturas con filtros
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: buscar
          schema: { type: string }
          description: Filtro por ID personalizado, nombre o cédula del cliente
        - in: query
          name: estado
          schema: { type: string, enum: [PAGADO, PARCIAL, PENDIENTE] }
        - in: query
          name: tipo
          schema: { type: string, enum: [CONTADO, CREDITO] }
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200': { description: Lista de facturas }

  /factura/crear:
    post:
      tags: [Ventas / Facturas]
      summary: Crear factura de venta
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearFacturaRequest'
      responses:
        '201': { description: Factura creada }

  /factura/buscar/{id}:
    get:
      tags: [Ventas / Facturas]
      summary: Obtener factura por ID
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Factura encontrada }
        '404': { $ref: '#/components/responses/NotFound' }

  /factura/cliente/{clienteId}:
    get:
      tags: [Ventas / Facturas]
      summary: Listar facturas de un cliente
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: clienteId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Facturas del cliente }

  /factura/resumen/{clienteId}:
    get:
      tags: [Ventas / Facturas]
      summary: Resumen financiero de un cliente
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: clienteId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Resumen del cliente }

  /factura/cobrar/{id}:
    put:
      tags: [Ventas / Facturas]
      summary: Registrar abono a factura
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [monto]
              properties:
                monto:      { type: number, format: float, minimum: 0.01 }
                metodoPago: { type: string, enum: [efectivo, transferencia, tarjeta] }
      responses:
        '200': { description: Abono registrado }

  /factura/anular/{id}:
    put:
